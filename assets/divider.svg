<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 6" width="1200" height="6" role="img" aria-label="divider">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .s{animation:sweep 3.2s ease-in-out infinite}
    @keyframes sweep{0%{transform:translateX(-220px)}60%,100%{transform:translateX(1200px)}}
  </style>
  <rect x="0" y="1" width="1200" height="4" rx="2" fill="url(#g)"/>
  <rect class="s" x="0" y="1" width="220" height="4" rx="2" fill="url(#shine)"/>
</svg>
