<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120" role="img" aria-label="footer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#24243e"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <style>
    .w1{animation:drift1 10s linear infinite}
    .w2{animation:drift2 16s linear infinite}
    .msg{font:500 14px 'Fira Code','SFMono-Regular',Consolas,monospace;fill:#a78bfa;opacity:.9}
    @keyframes drift1{from{transform:translateX(0)}to{transform:translateX(-300px)}}
    @keyframes drift2{from{transform:translateX(-400px)}to{transform:translateX(0)}}
  </style>
  <path class="w2" fill="url(#accent)" opacity="0.35" d="M0 26 Q100 10 200 26 T400 26 T600 26 T800 26 T1000 26 T1200 26 T1400 26 T1600 26 T1800 26 L1800 120 L0 120 Z"/>
  <path class="w1" fill="url(#bg)" d="M0 34 Q75 18 150 34 T300 34 T450 34 T600 34 T750 34 T900 34 T1050 34 T1200 34 T1350 34 T1500 34 T1650 34 T1800 34 L1800 120 L0 120 Z"/>
  <text class="msg" x="600" y="86" text-anchor="middle">~ crafted with ☕ &amp; clean code in the Netherlands ~</text>
</svg>
